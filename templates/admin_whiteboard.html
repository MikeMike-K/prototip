{% extends "base.html" %}
{% block title %}Интерактивная доска{% endblock %}
{% block content %}
<style>
    .wb-layout { display:flex; gap:15px; flex-wrap:wrap; position:relative; }
    .wb-toolbar { background:#fff; padding:12px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); width:220px; }
    .wb-stage { flex:1; min-width:300px; background:#e9ecef; border-radius:10px; padding:10px; position:relative; overflow:hidden; }
    canvas { background:#fff; border:1px solid #ccc; border-radius:8px; cursor:crosshair; width:100%; touch-action:none; position:relative; z-index:1; }
    #image-layer { position:absolute; top:10px; left:10px; right:10px; bottom:10px; z-index:2; pointer-events:none; }
    .overlay-img { position:absolute; pointer-events:auto; cursor:move; border:2px solid transparent; transition:border 0.2s; }
    .overlay-img:hover, .overlay-img.active { border-color:#667eea; }
    .overlay-img img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
    .resize-handle { position:absolute; bottom:-6px; right:-6px; width:12px; height:12px; background:#667eea; border-radius:50%; cursor:nwse-resize; display:none; }
    .overlay-img:hover .resize-handle, .overlay-img.active .resize-handle { display:block; }
    .wb-btn { width:100%; padding:10px; margin:5px 0; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:0.2s; }
    .wb-btn:hover { opacity:0.9; transform:translateY(-1px); }
    .wb-btn.active { outline:2px solid #222; }
    .wb-btn.pen { background:#2196F3; color:#fff; } .wb-btn.hl { background:#FF9800; color:#fff; }
    .wb-btn.eraser { background:#9E9E9E; color:#fff; } .wb-btn.clear { background:#f44336; color:#fff; }
    .wb-btn.save { background:#4CAF50; color:#fff; } .wb-btn.gallery { background:#3F51B5; color:#fff; margin-top:10px; }
    .color-pick { display:flex; gap:8px; margin:10px 0; flex-wrap:wrap; }
    .color-pick span { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
    .color-pick span.active { border-color:#333; transform:scale(1.15); }
    input[type="color"] { width:100%; height:35px; border:none; cursor:pointer; }
    .file-label { display:block; padding:10px; background:#607D8B; color:#fff; border-radius:6px; text-align:center; cursor:pointer; margin:5px 0; }
</style>

<div class="wb-layout">
    <div class="wb-toolbar">
        <h3 style="margin:0 0 15px;">🎨 Инструменты</h3>
        <button class="wb-btn pen active" onclick="setTool('pen')">✏️ Маркер</button>
        <button class="wb-btn hl" onclick="setTool('hl')">🖍️ Выделитель</button>
        <button class="wb-btn eraser" onclick="setTool('eraser')">🧼 Ластик</button>

        <div style="margin:15px 0 5px; font-weight:600;">Цвет:</div>
        <div class="color-pick" id="palette">
            <span style="background:#000" class="active" onclick="setColor(this)"></span>
            <span style="background:#E53935" onclick="setColor(this)"></span>
            <span style="background:#1E88E5" onclick="setColor(this)"></span>
            <span style="background:#43A047" onclick="setColor(this)"></span>
            <span style="background:#FFB300" onclick="setColor(this)"></span>
        </div>
        <input type="color" id="customColor" onchange="setColor(this)" title="Свой цвет">

        <div style="margin:15px 0 5px; font-weight:600;">Размер:</div>
        <input type="range" min="1" max="25" value="3" id="sizeRange" oninput="size=parseInt(this.value)" style="width:100%;">

        <label class="file-label">🖼️ Загрузить фото<input type="file" id="imgUpload" accept="image/*" onchange="addImage(this)" hidden></label>
        <p style="font-size:11px; color:#666; margin:5px 0;">Двойной клик по фото → удалить. Тяните за рамку → переместить. Тяните за точку → изменить размер.</p>

        <button class="wb-btn clear" onclick="clearBoard()">🗑 Очистить</button>
        <button class="wb-btn save" onclick="saveBoard()">💾 Сохранить</button>
        <a href="{{ url_for('whiteboard_gallery') }}" class="wb-btn gallery" style="display:block; text-align:center; text-decoration:none;">🖼️ Галерея досок</a>
    </div>

    <div class="wb-stage">
        <canvas id="board"></canvas>
        <div id="image-layer"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let tool = 'pen', color = '#000', size = 3, isDrawing = false;

function initCanvas() {
    const wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth - 20;
    canvas.height = Math.max(window.innerHeight - 180, 500);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
window.onload = initCanvas;
window.onresize = initCanvas;

function setTool(t) {
    tool = t;
    document.querySelectorAll('.wb-btn.pen,.wb-btn.hl,.wb-btn.eraser').forEach(b=>b.classList.remove('active'));
    document.querySelector(`.wb-btn.${t}`).classList.add('active');
    canvas.style.cursor = t==='eraser' ? 'cell' : 'crosshair';
}
function setColor(el) {
    color = el.value || el.style.background;
    document.querySelectorAll('#palette span').forEach(s=>s.classList.remove('active'));
    if(el.tagName==='SPAN') el.classList.add('active');
}

function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.touches?e.touches[0].clientX:e.clientX) - r.left, y: (e.touches?e.touches[0].clientY:e.clientY) - r.top };
}
function start(e){ e.preventDefault(); isDrawing=true; draw(e); }
function end(){ isDrawing=false; ctx.beginPath(); }
function draw(e) {
    if(!isDrawing) return; e.preventDefault();
    const p = getPos(e);
    if(tool==='eraser') {
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = size * 5;
    } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.lineWidth = tool==='hl' ? size*4 : size;
        ctx.strokeStyle = color;
        ctx.globalAlpha = tool==='hl' ? 0.3 : 1;
    }
    ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
}
['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,start));
['mouseup','touchend','mouseleave'].forEach(ev=>canvas.addEventListener(ev,end));
canvas.addEventListener('mousemove', draw, {passive:false});
canvas.addEventListener('touchmove', draw, {passive:false});

function addImage(input) {
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const div = document.createElement('div'); div.className='overlay-img';
        div.style.cssText = `left:30px;top:30px;width:200px;height:auto;`;
        div.innerHTML = `<img src="${e.target.result}" draggable="false"><div class="resize-handle"></div>`;
        document.getElementById('image-layer').appendChild(div);
        makeDraggable(div);
    };
    reader.readAsDataURL(file); input.value='';
}

function makeDraggable(el) {
    let dragging=false, resizing=false, sx,sy, sl,st, sw,sh;
    el.addEventListener('mousedown', e => {
        if(e.target.classList.contains('resize-handle')) { resizing=true; sw=el.offsetWidth; sh=el.offsetHeight; }
        else dragging=true;
        sx=e.clientX; sy=e.clientY; sl=el.offsetLeft; st=el.offsetTop;
        e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
        if(!dragging && !resizing) return;
        const dx=e.clientX-sx, dy=e.clientY-sy;
        if(dragging) { el.style.left=(sl+dx)+'px'; el.style.top=(st+dy)+'px'; }
        else { el.style.width=Math.max(50,sw+dx)+'px'; el.style.height='auto'; }
    });
    document.addEventListener('mouseup', () => dragging=resizing=false);
    el.addEventListener('dblclick', () => { if(confirm('Удалить это изображение?')) el.remove(); });
    el.addEventListener('click', e => { document.querySelectorAll('.overlay-img').forEach(d=>d.classList.remove('active')); el.classList.add('active'); e.stopPropagation(); });
}

function clearBoard() {
    if(confirm('Очистить доску?')) { ctx.clearRect(0,0,canvas.width,canvas.height); document.getElementById('image-layer').innerHTML=''; }
}

function saveBoard() {
    const title = prompt('Название доски:', 'Доска '+new Date().toLocaleDateString()) || 'Без названия';
    const off = document.createElement('canvas'); off.width=canvas.width; off.height=canvas.height;
    const octx = off.getContext('2d');
    octx.drawImage(canvas,0,0);

    // Композитинг изображений
    const layer = document.getElementById('image-layer');
    const cRect = canvas.getBoundingClientRect();
    layer.querySelectorAll('.overlay-img').forEach(div => {
        const dRect = div.getBoundingClientRect();
        octx.drawImage(div.querySelector('img'), dRect.left-cRect.left, dRect.top-cRect.top, dRect.width, dRect.height);
    });

    const dataURL = off.toDataURL('image/png');
    fetch('/admin/whiteboard/save', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({image:dataURL, title:title})
    }).then(r=>r.json()).then(d => d.success ? alert('✅ Сохранено!') : alert('❌ '+d.error));
}
</script>
{% endblock %}
