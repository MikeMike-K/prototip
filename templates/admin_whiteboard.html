{% extends "base.html" %}
{% block title %}Интерактивная доска{% endblock %}
{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    .wb-layout { display:flex; gap:15px; flex-wrap:wrap; }
    .wb-toolbar { background:#fff; padding:12px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); width:220px; }
    .wb-stage { flex:1; min-width:300px; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); position:relative; overflow:hidden; height:600px; }
    canvas { display:block; touch-action:none; cursor:crosshair; }
    #overlay-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

    .overlay-item { position:absolute; pointer-events:auto; user-select:none; transition:box-shadow 0.2s; }
    .overlay-item:hover, .overlay-item.active { box-shadow:0 0 0 2px #667eea; border-radius:4px; }

    .overlay-img img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
    .overlay-text {
        min-width:60px; min-height:30px; padding:6px 8px;
        background:rgba(255,255,255,0.95); border:1px solid #ddd; border-radius:4px;
        font-family:sans-serif; font-size:16px; color:#333; cursor:text;
        outline:none; word-break:break-word; line-height:1.4; overflow:auto;
    }
    .overlay-text:focus { border-color:#667eea; background:#fff; cursor:text; box-shadow:none; }
    .overlay-text:empty::before { content:"Введите текст..."; color:#aaa; pointer-events:none; }

    /* Кнопки управления */
    .del-btn {
        position:absolute; top:-11px; right:-11px; width:22px; height:22px;
        background:#e53935; color:#fff; border:2px solid #fff; border-radius:50%;
        cursor:pointer; display:none; font-size:14px; line-height:18px; text-align:center;
        z-index:40; box-shadow:0 2px 6px rgba(0,0,0,0.25);
    }
    .del-btn:hover { background:#c62828; transform:scale(1.1); }
    .resize-handle {
        position:absolute; bottom:-7px; right:-7px; width:14px; height:14px;
        background:#667eea; border:2px solid #fff; border-radius:50%;
        cursor:nwse-resize; display:none; z-index:40; box-shadow:0 2px 6px rgba(0,0,0,0.25);
    }
    .overlay-item:hover .resize-handle, .overlay-item:hover .del-btn,
    .overlay-item.active .resize-handle, .overlay-item.active .del-btn { display:block; }

    .wb-btn { width:100%; padding:10px; margin:5px 0; border:none; border-radius:6px; cursor:pointer; font-weight:600; transition:0.2s; }
    .wb-btn:hover { opacity:0.9; transform:translateY(-1px); }
    .wb-btn.active { outline:2px solid #222; }
    .wb-btn.pen { background:#2196F3; color:#fff; } .wb-btn.hl { background:#FF9800; color:#fff; }
    .wb-btn.eraser { background:#9E9E9E; color:#fff; } .wb-btn.text { background:#4CAF50; color:#fff; }
    .wb-btn.clear { background:#f44336; color:#fff; } .wb-btn.save { background:#667eea; color:#fff; }
    .wb-btn.gallery { background:#3F51B5; color:#fff; margin-top:10px; display:block; text-align:center; text-decoration:none; padding:10px; border-radius:6px; }

    .color-pick { display:flex; gap:8px; margin:10px 0; flex-wrap:wrap; }
    .color-pick span { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
    .color-pick span.active { border-color:#333; transform:scale(1.15); }
    input[type="color"] { width:100%; height:35px; border:none; cursor:pointer; }
    .file-label { display:block; padding:10px; background:#607D8B; color:#fff; border-radius:6px; text-align:center; cursor:pointer; margin:5px 0; }
</style>

<div class="wb-layout">
    <div class="wb-toolbar">
        <h3 style="margin:0 0 15px;">🎨 Инструменты</h3>
        <button class="wb-btn pen active" onclick="setTool('pen')">✏️ Маркер</button>
        <button class="wb-btn hl" onclick="setTool('hl')">🖍️ Выделитель</button>
        <button class="wb-btn eraser" onclick="setTool('eraser')">🧼 Ластик</button>
        <button class="wb-btn text" onclick="addText()">📝 Добавить текст</button>

        <div style="margin:15px 0 5px; font-weight:600;">Цвет:</div>
        <div class="color-pick" id="palette">
            <span style="background:#000" class="active" onclick="setColor(this)"></span>
            <span style="background:#E53935" onclick="setColor(this)"></span>
            <span style="background:#1E88E5" onclick="setColor(this)"></span>
            <span style="background:#43A047" onclick="setColor(this)"></span>
            <span style="background:#FFB300" onclick="setColor(this)"></span>
        </div>
        <input type="color" id="customColor" onchange="setColor(this)" title="Свой цвет">

        <div style="margin:15px 0 5px; font-weight:600;">Размер кисти:</div>
        <input type="range" min="1" max="25" value="3" id="sizeRange" oninput="size=parseInt(this.value)" style="width:100%;">

        <label class="file-label">🖼️ Загрузить фото<input type="file" id="imgUpload" accept="image/*" onchange="addImage(this)" hidden></label>
        <p style="font-size:11px; color:#666; margin:5px 0;">💡 Клик по тексту → редактировать. Тяните за синий кружок → изменить размер.</p>

        <button class="wb-btn clear" onclick="clearBoard()">🗑 Очистить</button>
        <button class="wb-btn save" onclick="saveBoard()">💾 Сохранить</button>
        <a href="{{ url_for('whiteboard_gallery') }}" class="wb-btn gallery">🖼️ Галерея досок</a>
    </div>

    <div class="wb-stage" id="wb-stage">
        <canvas id="board"></canvas>
        <div id="overlay-layer"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let tool = 'pen', color = '#000', size = 3, isDrawing = false;

function initCanvas() {
    const stage = document.getElementById('wb-stage');
    canvas.width = stage.clientWidth;
    canvas.height = stage.clientHeight;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
window.onload = initCanvas;
window.onresize = initCanvas;

function setTool(t) {
    tool = t;
    document.querySelectorAll('.wb-btn.pen,.wb-btn.hl,.wb-btn.eraser').forEach(b=>b.classList.remove('active'));
    document.querySelector(`.wb-btn.${t}`).classList.add('active');
    canvas.style.cursor = t==='eraser' ? 'cell' : 'crosshair';
}
function setColor(el) {
    color = el.value || el.style.background;
    document.querySelectorAll('#palette span').forEach(s=>s.classList.remove('active'));
    if(el.tagName==='SPAN') el.classList.add('active');
}

function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.touches?e.touches[0].clientX:e.clientX) - r.left, y: (e.touches?e.touches[0].clientY:e.clientY) - r.top };
}
function startDraw(e){ e.preventDefault(); isDrawing=true; draw(e); }
function endDraw(){ isDrawing=false; ctx.beginPath(); }
function draw(e) {
    if(!isDrawing) return; e.preventDefault();
    const p = getPos(e);
    ctx.beginPath();
    if(tool==='eraser') {
        ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = size * 5; ctx.globalAlpha = 1;
    } else if(tool==='hl') {
        ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = color; ctx.lineWidth = size * 4; ctx.globalAlpha = 0.35;
    } else {
        ctx.globalCompositeOperation = 'source-over'; ctx.strokeStyle = color; ctx.lineWidth = size; ctx.globalAlpha = 1;
    }
    ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.moveTo(p.x, p.y);
}
['mousedown','touchstart'].forEach(ev=>canvas.addEventListener(ev,startDraw));
['mouseup','touchend','mouseleave'].forEach(ev=>canvas.addEventListener(ev,endDraw));
canvas.addEventListener('mousemove', draw, {passive:false});
canvas.addEventListener('touchmove', draw, {passive:false});

// === OVERLAYS (Фото + Текст) ===
function addImage(input) {
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e => createOverlay('img', e.target.result, 200, 'auto');
    reader.readAsDataURL(file); input.value='';
}

function addText() {
    createOverlay('text', '', 200, 'auto');
}

function createOverlay(type, content, w, h) {
    const div = document.createElement('div');
    div.className = `overlay-item overlay-${type}`;
    div.style.cssText = `left:40px;top:40px;width:${w}px;min-height:${h}px;`;

    if(type==='text') {
        div.contentEditable = true;
        div.innerHTML = content;
        div.spellcheck = false;
        requestAnimationFrame(() => div.focus());
    } else {
        div.innerHTML = `<img src="${content}" draggable="false">`;
    }

    // Кнопка удаления (правый верхний угол)
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn'; delBtn.textContent = '×'; delBtn.title = 'Удалить';
    delBtn.onclick = (e) => { e.stopPropagation(); e.preventDefault(); div.remove(); };

    // Ручка ресайза (правый нижний угол)
    const resHandle = document.createElement('div');
    resHandle.className = 'resize-handle';

    div.appendChild(delBtn); div.appendChild(resHandle);
    document.getElementById('overlay-layer').appendChild(div);

    // Управление фокусом/выделением
    div.addEventListener('mousedown', e => {
        if(type==='text' && document.activeElement === div) {
            e.stopPropagation(); // Разрешаем выделение/печать
            return;
        }
        if(e.target === delBtn || e.target === resHandle) return;
        activate(div);
    });

    div.addEventListener('focus', () => { div.classList.add('active'); });
    div.addEventListener('blur', () => { div.classList.remove('active'); });

    makeDraggable(div);
    makeResizable(div);
}

function activate(el) {
    document.querySelectorAll('.overlay-item').forEach(d=>d.classList.remove('active'));
    el.classList.add('active');
}

function makeDraggable(el) {
    let isDragging=false, sx,sy, sl,st;
    el.addEventListener('mousedown', e => {
        if(el.isContentEditable && document.activeElement === el) return;
        if(e.target.classList.contains('del-btn') || e.target.classList.contains('resize-handle')) return;
        isDragging=true; sx=e.clientX; sy=e.clientY; sl=el.offsetLeft; st=el.offsetTop; activate(el);
    });
    document.addEventListener('mousemove', e => {
        if(!isDragging) return;
        el.style.left=(sl+e.clientX-sx)+'px'; el.style.top=(st+e.clientY-sy)+'px';
    });
    document.addEventListener('mouseup', () => isDragging=false);
}

// ✅ Исправленный ресайз: меняет и ширину, и высоту
function makeResizable(el) {
    const handle = el.querySelector('.resize-handle');
    let isResizing=false, startW, startH, startX, startY;
    handle.addEventListener('mousedown', e => {
        isResizing=true;
        startW=el.offsetWidth; startH=el.offsetHeight;
        startX=e.clientX; startY=e.clientY;
        e.preventDefault(); e.stopPropagation();
    });
    document.addEventListener('mousemove', e => {
        if(!isResizing) return;
        const newW = Math.max(60, startW + (e.clientX - startX));
        const newH = Math.max(30, startH + (e.clientY - startY));
        el.style.width = newW + 'px';
        el.style.height = newH + 'px';
    });
    document.addEventListener('mouseup', () => isResizing=false);
}

function clearBoard() {
    if(confirm('Очистить доску?')) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        document.getElementById('overlay-layer').innerHTML='';
    }
}

function saveBoard() {
    const title = prompt('Название доски:', 'Доска '+new Date().toLocaleDateString()) || 'Без названия';
    const stage = document.getElementById('wb-stage');

    document.querySelectorAll('.del-btn, .resize-handle').forEach(el=>el.style.display='none');
    document.querySelectorAll('.overlay-item').forEach(el=>el.style.boxShadow='none');

    html2canvas(stage, { backgroundColor: '#ffffff', scale: 2, useCORS: true }).then(savedCanvas => {
        document.querySelectorAll('.del-btn, .resize-handle').forEach(el=>el.style.display='');
        document.querySelectorAll('.overlay-item.active').forEach(el=>el.style.boxShadow='0 0 0 2px #667eea');

        fetch('/admin/whiteboard/save', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({image: savedCanvas.toDataURL('image/png'), title:title})
        }).then(r=>r.json()).then(d => d.success ? alert('✅ Сохранено в галерею!') : alert('❌ '+d.error));
    });
}
</script>
{% endblock %}
