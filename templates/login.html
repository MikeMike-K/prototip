{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 80px auto;">
    <h2 style="text-align:center; margin-bottom: 25px;">🔐 Вход</h2>
    <form method="POST">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" name="login" required placeholder="Введите логин">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" required placeholder="Введите пароль">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
    </form>
    <p style="text-align:center; margin-top:15px;">
        Нет аккаунта? <a href="{{ url_for('register') }}" style="color:#667eea;">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
